<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>OGDEN Land Design Atlas</title>
  <script>
    // SPA redirect for GitHub Pages.
    // Encodes the full path + query as a param on the root URL so the
    // main index.html can restore it via history.replaceState.
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/?p=' + encodeURIComponent(l.pathname + l.search) + l.hash
    );
  </script>
</head>
<body></body>
</html>
