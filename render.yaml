# ─────────────────────────────────────────────────────────────────────────────
# OGDEN Atlas — Render Blueprint (managed full-stack deploy)
#
# Maps ~1:1 onto infrastructure/docker-compose.prod.yml, but for Render:
#   • atlas-postgres  — managed PostGIS database (private)
#   • atlas-redis     — managed Key Value (Redis) for BullMQ + WS pub/sub (private)
#   • atlas-api       — Fastify backend, PRIVATE service (no public URL)
#   • atlas-web       — public nginx: serves the SPA AND reverse-proxies /api to
#                       atlas-api. Single front door → relative /api/v1 URLs and
#                       same-origin WebSockets work with zero frontend change.
#
# First deploy: Render → New → Blueprint → pick this repo/branch. Fill the
# `sync: false` secrets in the dashboard. See infrastructure/DEPLOY-RENDER.md.
#
# Keep all services in ONE region so private networking (atlas-api:3001,
# internal DB/Redis URLs) resolves.
# ─────────────────────────────────────────────────────────────────────────────

databases:
  - name: atlas-postgres
    databaseName: atlas
    user: atlas
    plan: basic-256mb          # cheapest PAID tier — the free DB expires ~30 days
    region: oregon
    postgresMajorVersion: "16"
    ipAllowList: []            # internal-only; no public connections

services:
  # ── Redis / Key Value (BullMQ queue + WS pub/sub) ──────────────────────────
  - type: keyvalue
    name: atlas-redis
    plan: starter              # paid — free tier forces an eviction policy
    region: oregon
    maxmemoryPolicy: noeviction  # BullMQ must never have jobs evicted
    ipAllowList: []            # internal-only

  # ── Fastify API (PRIVATE — only atlas-web reaches it) ──────────────────────
  - type: pserv
    name: atlas-api
    runtime: docker
    dockerfilePath: ./infrastructure/Dockerfile.api
    dockerContext: .
    plan: starter              # non-suspending: BullMQ workers + WS subscriber start in onReady
    region: oregon
    # healthCheckPath not supported on pserv (private service) — removed
    # Managed Postgres has no docker-entrypoint-initdb.d hook, so run the
    # idempotent migration runner on every deploy. WORKDIR is /app/apps/api.
    preDeployCommand: node dist/db/migrate.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"          # nginx upstream is atlas-api:3001
      - key: DATABASE_URL
        fromDatabase:
          name: atlas-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: atlas-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true    # Render generates a strong secret (>=32 chars)
      - key: CORS_ORIGIN
        value: https://atlas.ogden.ag
      - key: APP_PUBLIC_URL
        value: https://atlas.ogden.ag   # base for verify/reset email links
      # ── Reverse-proxy hop count (makes per-IP portal rate limits real) ──────
      # The proxy chain in front of Fastify is: client → Render edge →
      # atlas-web (nginx) → atlas-api. nginx appends its own address to
      # X-Forwarded-For (infrastructure/nginx/conf.d/default.conf), so the api
      # trusts 2 hops to recover the client IP. If unset, every public visitor
      # shares ONE rate-limit bucket (ineffective + self-DoS). VERIFY post-deploy:
      # hit the portal from two client IPs and confirm two independent buckets;
      # if the real client IP is still masked, bump to "1" or "3" — no code change.
      - key: TRUST_PROXY
        value: "2"
      # ── Rate limits (surfaced at code defaults for dashboard tuning) ────────
      # Global per-IP cap (all routes) + the tighter unauthenticated-portal caps.
      # All four only bite once TRUST_PROXY (above) recovers the real client IP;
      # otherwise every visitor shares the proxy's single bucket. Defaults live in
      # apps/api/src/lib/config.ts — mirrored here so they're visible and tunable
      # from the dashboard without a code change.
      - key: RATE_LIMIT_MAX
        value: "200"           # global requests per IP per window
      - key: RATE_LIMIT_WINDOW
        value: "1 minute"
      - key: PORTAL_PUBLIC_RATE_LIMIT_MAX
        value: "60"            # unauthenticated portal GETs per IP / minute
      - key: PORTAL_PDF_RATE_LIMIT_MAX
        value: "10"            # portal PDF streams per IP / minute (heavier)
      # ── Email (verification + password reset) ──────────────────────────────
      - key: EMAIL_TRANSPORT
        value: resend
      - key: EMAIL_FROM
        value: OGDEN Atlas <noreply@ogden.ag>
      - key: RESEND_API_KEY
        sync: false            # set in dashboard (required when EMAIL_TRANSPORT=resend)
      # ── Maps / model providers ─────────────────────────────────────────────
      - key: MAPTILER_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # ── Object storage (proof photos / exports) — set to avoid ephemeral disk
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false

  # ── Public front door: nginx serving the SPA + proxying /api ───────────────
  - type: web
    name: atlas-web
    runtime: docker
    dockerfilePath: ./infrastructure/Dockerfile.nginx
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /healthz  # static 200 from nginx (decoupled from API health)
    domains:
      - atlas.ogden.ag
    envVars:
      # Render passes service env vars as Docker --build-arg, so these reach the
      # Vite build (import.meta.env.VITE_*). Both are inlined into the SPA bundle.
      - key: VITE_MAPTILER_KEY
        sync: false
      - key: VITE_CESIUM_ION_TOKEN
        sync: false
      # Demo mode — auto-registers a throwaway guest session on boot so the live
      # test deployment is explorable WITHOUT logging in. The real LoginPage
      # works; this is a deliberate explorable-without-login test-launch
      # convenience, not a broken-login workaround. Read from process.env in
      # vite.config.ts and inlined into the bundle.
      #   DEFERRED: throwaway guest accounts accumulate in the DB — there is no
      #     cleanup job yet. Acceptable for the test launch; revisit with real use.
      #   REVISIT BEFORE REAL LAUNCH: set to "false" (or remove) to restore the
      #     login wall at production cutover. The auth-bypass posture (anyone can
      #     boot a guest session) MUST be reconsidered before a real launch.
      - key: FEATURE_DEMO_MODE
        value: "true"
