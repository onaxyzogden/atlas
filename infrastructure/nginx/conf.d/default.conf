# ── OGDEN Atlas — Nginx site configuration ────────────────────────────────
#
# Replace atlas.ogden.ag with your domain.
# After certbot obtains certificates, uncomment the SSL server block
# and the HTTP→HTTPS redirect.

upstream api_backend {
    server api:3001;
}

# ── HTTP server (certbot challenge + redirect to HTTPS) ───────────────────

server {
    listen 80;
    server_name atlas.ogden.ag;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Uncomment after SSL is configured:
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # ── Serve without SSL until certificates are obtained ─────────────────
    # Remove this block once HTTPS redirect above is enabled.

    # API proxy
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # WebSocket upgrade support (required for /api/v1/ws/*)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # CORS handled by Fastify — don't duplicate headers
    }

    # Health check (no auth)
    location = /health {
        proxy_pass http://api_backend/health;
    }

    # Static React app (SPA fallback)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively (Vite hashes filenames)
        location ~* \.(js|css|woff2?|png|jpg|svg|ico|webp|wasm)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Cesium static assets (Workers, Assets, ThirdParty)
        location /cesium/ {
            expires 30d;
            add_header Cache-Control "public";
        }
    }
}

