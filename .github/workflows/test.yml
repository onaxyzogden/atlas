name: Test (apps/web)

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # Durable hang backstop. vitest's force-exit reporter fires from
    # onFinished, which a file-finalization hang never reaches (a pending
    # promise surviving happy-dom teardown keeps the worker from finalizing the
    # file), so nothing inside vitest can recover. Without a job timeout such a
    # regression rides the 6h GitHub default and blocks every PR. 15 min is far
    # above this fast suite's real runtime (seconds) yet fails fast on a hang.
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        # `test` is `node scripts/check-react-resolution.mjs && vitest run`,
        # so the react-resolution guard runs first as a true server-side gate.
        # Step-level timeout (below the job timeout) so a hang is attributed to
        # this step and fails fast.
        timeout-minutes: 10
        run: pnpm --filter @ogden/web test
        env:
          NODE_OPTIONS: --max-old-space-size=7168
